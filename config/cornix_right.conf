# Configuration for mono LED widget

# Enable RGB LED Widget
CONFIG_RGBLED_WIDGET=y

# Enable mono LED mode (simple GPIO LEDs)
CONFIG_RGBLED_WIDGET_MONO=y

# Disable WS2812 and regular LED modes
CONFIG_RGBLED_WIDGET_WS2812=n
CONFIG_RGBLED_WIDGET_LED=n

# Battery reporting (required for battery status)
CONFIG_ZMK_BATTERY_REPORTING=y

# BLE configuration (for connectivity status)
CONFIG_ZMK_BLE=y

# Mono LED specific configuration
CONFIG_RGBLED_WIDGET_MONO_TIMEOUT_MS=5000
CONFIG_RGBLED_WIDGET_MONO_BATTERY_BLINK_MS=300
CONFIG_RGBLED_WIDGET_MONO_CONN_BLINK_MS=200
CONFIG_RGBLED_WIDGET_MONO_LAYER_BLINK_MS=400
CONFIG_RGBLED_WIDGET_MONO_SHARE_TIMEOUT_MS=1000

# Enable connectivity status for both USB and BLE
CONFIG_RGBLED_WIDGET_CONN_SHOW_USB=y

# Battery level thresholds
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=80
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=20
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=5

# Optional: Enable power management for battery optimization
# CONFIG_RGBLED_WIDGET_POWER_MGMT=y
# CONFIG_RGBLED_WIDGET_POWER_MGMT_BATTERY_THRESHOLD=20
# CONFIG_RGBLED_WIDGET_POWER_MGMT_IDLE_TIMEOUT_MS=300000

# Logging level (optional, for debugging)
CONFIG_ZMK_LOG_LEVEL_DBG=y
